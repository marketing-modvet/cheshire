<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Dashed circle border, tightened pattern to match existing -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#015b63" stroke-width="1.5"
          stroke-dasharray="6 2.5" stroke-linecap="round"/>

  <!-- CT scanner glyph — refined: thinner strokes, more breathing room -->
  <g fill="none" stroke="#015b63" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer gantry (donut) -->
    <circle cx="100" cy="96" r="30"/>
    <!-- Inner bore -->
    <circle cx="100" cy="96" r="14"/>
    <!-- Patient inside the bore (small body silhouette suggesting head + body) -->
    <ellipse cx="100" cy="96" rx="5" ry="3.2" fill="#015b63" stroke="none"/>
    <!-- Subtle slice marks on gantry (rotation indicators at 4 positions) -->
    <line x1="100" y1="69" x2="100" y2="73"/>
    <line x1="100" y1="119" x2="100" y2="123"/>
    <line x1="127" y1="96" x2="123" y2="96"/>
    <line x1="73"  y1="96" x2="77"  y2="96"/>
    <!-- Patient bed/table extending forward through the bore -->
    <line x1="62"  y1="118" x2="138" y2="118"/>
    <line x1="62"  y1="122" x2="138" y2="122"/>
    <!-- Bed support legs -->
    <line x1="70"  y1="122" x2="70"  y2="135"/>
    <line x1="130" y1="122" x2="130" y2="135"/>
    <!-- Bed base -->
    <line x1="64"  y1="135" x2="136" y2="135"/>
  </g>
</svg>
